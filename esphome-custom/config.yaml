name: "ESPHome (Custom)"
version: "0.0.1"
stage: experimental
slug: "esphome_custom"
description: "ESPHome add-on with trusted_domains support for Home Assistant URL websocket validation"
url: "https://github.com/andrevza/ha-apps"
arch:
  - amd64
  - aarch64
hassio_api: true
auth_api: true
host_network: true
ingress: true
ingress_port: 0
panel_icon: mdi:chip
uart: true
ports:
  6052/tcp: null
map:
  - ssl:ro
  - config:rw
discovery:
  - esphome
schema:
  status_use_ping: bool?
  streamer_mode: bool?
  trusted_domains: str?
  home_assistant_dashboard_integration: bool?
  default_compile_process_limit: int(1,)?
  ssl: bool?
  certfile: str?
  keyfile: str?
  leave_front_door_open: bool?
backup_exclude:
  - "*/*/"
init: false
startup: services
